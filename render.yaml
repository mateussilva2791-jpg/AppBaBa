databases:
  - name: baba-db
    plan: free
    databaseName: baba_saas
    user: baba

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: baba-api
    runtime: docker
    plan: starter
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api
      - key: API_HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: baba-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        value: "*"

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: baba-frontend
    runtime: docker
    plan: starter
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
