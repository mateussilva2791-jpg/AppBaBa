services:
  # Backend (FastAPI)
  - type: web
    name: baba-api
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api
      - key: API_HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: postgresql://baba_saas_user:nNFg85pXQq9j3lohz1ti4YJris8xHTgB@dpg-d7n6rd7avr4c73feknc0-a/baba_saas
      - key: FRONTEND_URL
        value: https://baba-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://baba-frontend.onrender.com
      - key: ADMIN_EMAIL
        value: mateussilva2791@gmail.com

  # Frontend (Next.js)
  - type: web
    name: baba-frontend
    runtime: docker
    plan: free
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://baba-api.onrender.com/api
      - key: BACKEND_INTERNAL_URL
        value: https://baba-api.onrender.com
      - key: NEXT_PUBLIC_ADMIN_EMAIL
        value: mateussilva2791@gmail.com
